# examples/biotech/tags.yaml — a RETARGET of config/tags.yaml to biotech / lab R&D.
#
# This replaces the default software/eng vocabulary. Notice the tags on the right
# (assay, contamination, regulatory, cell-line, validation, timeline, risk) are exactly the
# tags the personas in ./personas/*.yaml filter on — they are a matched pair. This is the
# whole "adapt it to your sources" move: one vocabulary file + one persona set, no source edit.

assay: assay
titer: assay
potency: assay
yield: assay
contaminat: contamination
mycoplasma: contamination
endotoxin: contamination
sterility: contamination
bioburden: contamination
gxp: regulatory
gmp: regulatory
fda: regulatory
21 cfr: regulatory
audit trail: regulatory
deviation: regulatory
cell line: cell-line
passage: cell-line
clone: cell-line
master cell bank: cell-line
validation: validation
qualif: validation
iq/oq/pq: validation
calibrat: validation
deadline: timeline
batch release: timeline
schedule: timeline
campaign: timeline
risk: risk
patient: risk
