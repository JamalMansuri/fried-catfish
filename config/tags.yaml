# config/tags.yaml — keyword (lowercased substring) -> tag the persona filters key on.
#
# THIS IS THE FIRST SEAM to edit when retargeting Catfish to a new domain (see ADAPTING.md).
# The tags on the right MUST match the `filter.tags_any` lists in personas/*.yaml — the two
# files are a matched pair. Change a tag here without updating the persona filters and that
# persona's lens comes up empty. (The tournament run header prints the active panel + lens
# count; `catfish ingest <folder> --config-dir <dir>` shows exactly which tags each note got.)
#
# This default vocabulary targets software / product / eng decisions. For a worked retarget to
# a completely different domain, see examples/lunch/ (its own tags.yaml + personas/).

